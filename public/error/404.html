<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/error/error.css">
</head>

<body>
  <div class="error-page">
    <main class="error-container">
      <div class="error-code vuetify-mb-6" aria-hidden="true">404</div>
      <h1 class="vuetify-text-h4-font-weight-bold-mb-3-text-primary">Page Not Found</h1>
      <p class="vuetify-text-body-1-text-medium-emphasis-mb-8">
        The requested URL
        <code class="highlight-url" id="currentPath"></code>
        was not found on this server.<br>
        That's all we know.
      </p>
      <a href="/" class="v-btn">Return to Home</a>
    </main>
  </div>
  <script>
    document.getElementById('currentPath').textContent = window.location.pathname + window.location.search;
  </script>
</body>

</html>
