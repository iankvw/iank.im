<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bad Gateway</title>
  <meta http-equiv="refresh" content="30">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/error/error.css">
</head>

<body>
  <div class="error-page">
    <main class="error-container">
      <div class="error-code vuetify-mb-6" aria-hidden="true">502</div>
      <h1 class="vuetify-text-h4-font-weight-bold-mb-3-text-primary">Bad Gateway</h1>
      <p class="vuetify-text-body-1-text-medium-emphasis-mb-8">
        The server encountered a temporary error and could not complete your request.<br>
        Please try again later. That's all we know.
      </p>
      <button type="button" class="v-btn" onclick="window.location.reload();">Try Again</button>
    </main>
  </div>
</body>

</html>
